<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Usage analytics</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <header class="ad-top">
    <a class="ad-home" href="index.html" title="All projects" aria-label="All projects">‹</a>
    <div class="ad-brand"><b>Admin</b> · Usage analytics</div>
    <div class="ad-actions">
      <label class="ad-filter">User
        <select id="ad-user-filter" title="Show analytics for a single login only"><option value="">All users</option></select>
      </label>
      <span class="ad-status" id="ad-status">loading…</span>
      <button class="ad-btn" id="ad-refresh" type="button">Refresh</button>
    </div>
  </header>

  <main class="ad-main" id="ad-main">
    <div class="ad-filterbar" id="ad-filterbar" hidden></div>
    <section class="ad-kpis" id="ad-kpis"></section>

    <section class="ad-block">
      <h2>People <span class="ad-sub">by password / login</span></h2>
      <div class="ad-tablewrap"><table class="ad-table" id="ad-users"></table></div>
    </section>

    <section class="ad-block">
      <h2>Logins &amp; passwords <span class="ad-sub">the password for each login (share these) · add a new login</span></h2>
      <div class="ad-tablewrap"><table class="ad-table" id="ad-logins"></table></div>
      <form class="ad-adduser" id="ad-adduser" autocomplete="off">
        <input type="text" id="ad-nu-name" placeholder="Login name (e.g. Jane Doe)" aria-label="New login name" required>
        <input type="text" id="ad-nu-pw" placeholder="Password" aria-label="New password" required>
        <select id="ad-nu-role" aria-label="Role"><option value="user">User</option><option value="admin">Admin</option></select>
        <button type="submit" class="ad-btn ad-btn-go">Add login</button>
        <span class="ad-adduser-note" id="ad-adduser-note"></span>
      </form>
    </section>

    <section class="ad-block">
      <h2>Project access <span class="ad-sub">which projects each login can open (admins always see all)</span></h2>
      <div class="ad-tablewrap"><table class="ad-table" id="ad-access"></table></div>
      <div class="ad-access-note" id="ad-access-note"></div>
    </section>

    <div class="ad-two">
      <section class="ad-block">
        <h2>Projects</h2>
        <div class="ad-tablewrap"><table class="ad-table" id="ad-projects"></table></div>
      </section>
      <section class="ad-block">
        <h2>Genes viewed <span class="ad-sub">most navigated</span></h2>
        <div class="ad-tablewrap ad-scroll"><table class="ad-table" id="ad-genes"></table></div>
      </section>
    </div>

    <section class="ad-block">
      <h2>Downloads</h2>
      <div class="ad-tablewrap ad-scroll"><table class="ad-table" id="ad-downloads"></table></div>
    </section>

    <section class="ad-block">
      <h2>Recent activity</h2>
      <div class="ad-tablewrap ad-scroll ad-tall"><table class="ad-table" id="ad-recent"></table></div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
